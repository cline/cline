name: Tests

on:
    push:
        branches:
            - main
    workflow_dispatch:
    pull_request:
        branches:
            - main
    workflow_call:

permissions:
    contents: read
    checks: write
    pull-requests: write

jobs:
    quality-checks:
        runs-on: ubuntu-latest
        name: Quality Checks
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Typecheck
              run: |
                  bun run build:sdk
                  bun run build:apps
                  bun run types

            - name: Lint & Format
              run: bun run lint

    test:
        needs: quality-checks
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      node-version: "20.x"
                    - os: ubuntu-latest
                      node-version: "24.x"
                    - os: windows-latest
                      node-version: "24.x"
        runs-on: ${{ matrix.os }}
        name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install dependencies
              run: bun install
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Build SDK and Apps
              id: build_step
              run: |
                  bun run build:sdk
                  bun run build:apps

            - name: Run Tests
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' }}
              run: bun run test

            - name: Smoke test SQLite under Node
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' }}
              run: bun scripts/ci-node-smoke.ts

            - name: Run TUI e2e tests
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' && matrix.os == 'ubuntu-latest' && matrix.node-version == '24.x' }}
              run: bun -F @clinebot/cli test:e2e:cli:tui

            - name: Verify packages are publishable
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' && matrix.os == 'ubuntu-latest' && matrix.node-version == '24.x' }}
              run: bun scripts/version.ts 0.0.0-verify --publish --check
