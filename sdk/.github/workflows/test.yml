name: Tests

on:
    push:
        branches:
            - main
    workflow_dispatch:
    pull_request:
        branches:
            - main
    workflow_call:

permissions:
    contents: read
    checks: write
    pull-requests: write

jobs:
    quality-checks:
        runs-on: ubuntu-latest
        name: Quality Checks
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Typecheck
              run: |
                  bun run build:sdk
                  bun run build:apps
                  bun run types

            - name: Lint & Format
              run: bun run lint

    test:
        needs: quality-checks
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      node-version: "20.x"
                    - os: ubuntu-latest
                      node-version: "24.x"
                    - os: windows-latest
                      node-version: "24.x"
        runs-on: ${{ matrix.os }}
        name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install dependencies
              run: bun install
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Build SDK and Apps
              id: build_step
              run: |
                  bun run build:sdk
                  bun run build:apps

            - name: Run Tests
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' }}
              run: bun run test

            - name: Smoke test SQLite under Node
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' }}
              shell: bash
              run: |
                  PACK_DIR="$RUNNER_TEMP/cline-node-smoke-packs"
                  SMOKE_DIR="$RUNNER_TEMP/cline-node-smoke"
                  rm -rf "$PACK_DIR" "$SMOKE_DIR"
                  mkdir -p "$PACK_DIR" "$SMOKE_DIR"
                  trap 'git restore packages/*/package.json; rm -f .publish-verify-package-json-backup.json' EXIT

                  bun scripts/version.ts 0.0.0-node.smoke --publish

                  CORE_TGZ=$(cd packages/core && npm pack --pack-destination "$PACK_DIR" | tail -n 1)
                  AGENTS_TGZ=$(cd packages/agents && npm pack --pack-destination "$PACK_DIR" | tail -n 1)
                  LLMS_TGZ=$(cd packages/llms && npm pack --pack-destination "$PACK_DIR" | tail -n 1)
                  SHARED_TGZ=$(cd packages/shared && npm pack --pack-destination "$PACK_DIR" | tail -n 1)

                  cat > "$SMOKE_DIR/package.json" <<EOF
                  {
                    "name": "cline-node-smoke",
                    "private": true,
                    "type": "module",
                    "dependencies": {
                      "@clinebot/core": "file:$PACK_DIR/$CORE_TGZ",
                      "@clinebot/agents": "file:$PACK_DIR/$AGENTS_TGZ",
                      "@clinebot/llms": "file:$PACK_DIR/$LLMS_TGZ",
                      "@clinebot/shared": "file:$PACK_DIR/$SHARED_TGZ"
                    }
                  }
                  EOF

                  cd "$SMOKE_DIR"
                  npm install --ignore-scripts

                  node --input-type=module - <<'EOF'
                  import { mkdtempSync, rmSync } from "node:fs";
                  import { join } from "node:path";
                  import { tmpdir } from "node:os";
                  import { SqliteSessionStore } from "@clinebot/core/node";

                  const sessionsDir = mkdtempSync(join(tmpdir(), "cline-sqlite-smoke-"));
                  try {
                    const store = new SqliteSessionStore({ sessionsDir });
                    store.init();
                    console.log("SQLite smoke test passed");
                  } finally {
                    rmSync(sessionsDir, { recursive: true, force: true });
                  }
                  EOF

            - name: Run TUI e2e tests
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' && matrix.os == 'ubuntu-latest' && matrix.node-version == '24.x' }}
              run: bun -F @clinebot/cli test:e2e:cli:tui

            - name: Verify packages are publishable
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' && matrix.os == 'ubuntu-latest' && matrix.node-version == '24.x' }}
              run: bun scripts/version.ts 0.0.0-verify --publish --check
