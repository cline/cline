syntax = "proto3";

package cline.rpc.v1;
import "google/protobuf/struct.proto";

service ClineGateway {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
  rpc RegisterClient(RegisterClientRequest) returns (RegisterClientResponse);
  rpc EnsureSession(EnsureSessionRequest) returns (EnsureSessionResponse);
  rpc UpsertSession(UpsertSessionRequest) returns (UpsertSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc UpdateSession(UpdateSessionRequest) returns (UpdateSessionResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
  rpc EnqueueSpawnRequest(EnqueueSpawnRequestRequest) returns (EnqueueSpawnRequestResponse);
  rpc ClaimSpawnRequest(ClaimSpawnRequestRequest) returns (ClaimSpawnRequestResponse);
  rpc StartRuntimeSession(StartRuntimeSessionRequest) returns (StartRuntimeSessionResponse);
  rpc SendRuntimeSession(SendRuntimeSessionRequest) returns (SendRuntimeSessionResponse);
  rpc StopRuntimeSession(StopRuntimeSessionRequest) returns (StopRuntimeSessionResponse);
  rpc AbortRuntimeSession(AbortRuntimeSessionRequest) returns (AbortRuntimeSessionResponse);
  rpc RunProviderAction(RunProviderActionRequest) returns (RunProviderActionResponse);
  rpc RunProviderOAuthLogin(RunProviderOAuthLoginRequest) returns (RunProviderOAuthLoginResponse);
  rpc EnterpriseAuthenticate(EnterpriseAuthenticateRequest) returns (EnterpriseAuthenticateResponse);
  rpc EnterpriseSync(EnterpriseSyncRequest) returns (EnterpriseSyncResponse);
  rpc EnterpriseGetStatus(EnterpriseStatusRequest) returns (EnterpriseStatusResponse);
  rpc StartTask(StartTaskRequest) returns (TaskResponse);
  rpc CompleteTask(CompleteTaskRequest) returns (TaskResponse);
  rpc PublishEvent(PublishEventRequest) returns (PublishEventResponse);
  rpc StreamEvents(StreamEventsRequest) returns (stream RoutedEvent);
  rpc RequestToolApproval(RequestToolApprovalRequest) returns (RequestToolApprovalResponse);
  rpc RespondToolApproval(RespondToolApprovalRequest) returns (RespondToolApprovalResponse);
  rpc ListPendingApprovals(ListPendingApprovalsRequest) returns (ListPendingApprovalsResponse);
  rpc CreateSchedule(CreateScheduleRequest) returns (CreateScheduleResponse);
  rpc GetSchedule(GetScheduleRequest) returns (GetScheduleResponse);
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse);
  rpc UpdateSchedule(UpdateScheduleRequest) returns (UpdateScheduleResponse);
  rpc DeleteSchedule(DeleteScheduleRequest) returns (DeleteScheduleResponse);
  rpc PauseSchedule(PauseScheduleRequest) returns (PauseScheduleResponse);
  rpc ResumeSchedule(ResumeScheduleRequest) returns (ResumeScheduleResponse);
  rpc TriggerScheduleNow(TriggerScheduleNowRequest) returns (TriggerScheduleNowResponse);
  rpc ListScheduleExecutions(ListScheduleExecutionsRequest) returns (ListScheduleExecutionsResponse);
  rpc GetScheduleStats(GetScheduleStatsRequest) returns (GetScheduleStatsResponse);
  rpc GetActiveScheduledExecutions(GetActiveScheduledExecutionsRequest) returns (GetActiveScheduledExecutionsResponse);
  rpc GetUpcomingScheduledRuns(GetUpcomingScheduledRunsRequest) returns (GetUpcomingScheduledRunsResponse);
}

message HealthRequest {}

message HealthResponse {
  string server_id = 1;
  string address = 2;
  bool running = 3;
  string started_at = 4;
  string rpc_version = 5;
}

message ShutdownRequest {}

message ShutdownResponse {
  bool accepted = 1;
}

message RegisterClientRequest {
  string client_id = 1;
  string client_type = 2;
  map<string, string> metadata = 3;
}

message RegisterClientResponse {
  string client_id = 1;
  bool registered = 2;
}

message SessionRecord {
  string session_id = 1;
  string source = 2;
  int32 pid = 3;
  string started_at = 4;
  string ended_at = 5;
  int32 exit_code = 6;
  string status = 7;
  int32 status_lock = 8;
  bool interactive = 9;
  string provider = 10;
  string model = 11;
  string cwd = 12;
  string workspace_root = 13;
  string team_name = 14;
  bool enable_tools = 15;
  bool enable_spawn = 16;
  bool enable_teams = 17;
  string parent_session_id = 18;
  string parent_agent_id = 19;
  string agent_id = 20;
  string conversation_id = 21;
  bool is_subagent = 22;
  string prompt = 23;
  string transcript_path = 24;
  string hook_path = 25;
  string messages_path = 26;
  string updated_at = 27;
  google.protobuf.Struct metadata = 28;
}

message EnsureSessionRequest {
  string session_id = 1;
  string client_id = 2;
  string workspace_root = 3;
  string status = 4;
  google.protobuf.Struct metadata = 5;
}

message EnsureSessionResponse {
  string session_id = 1;
  bool created = 2;
  string status = 3;
}

message UpsertSessionRequest {
  SessionRecord session = 1;
}

message UpsertSessionResponse {
  bool persisted = 1;
}

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionResponse {
  SessionRecord session = 1;
}

message ListSessionsRequest {
  int32 limit = 1;
  string parent_session_id = 2;
  string status = 3;
}

message ListSessionsResponse {
  repeated SessionRecord sessions = 1;
}

message UpdateSessionRequest {
  string session_id = 1;
  string status = 2;
  string ended_at = 3;
  int32 exit_code = 4;
  bool has_exit_code = 5;
  string prompt = 6;
  bool has_prompt = 7;
  string parent_session_id = 8;
  bool has_parent_session_id = 9;
  string parent_agent_id = 10;
  bool has_parent_agent_id = 11;
  string agent_id = 12;
  bool has_agent_id = 13;
  string conversation_id = 14;
  bool has_conversation_id = 15;
  int32 expected_status_lock = 16;
  bool has_expected_status_lock = 17;
  bool set_running = 18;
  google.protobuf.Struct metadata = 19;
  bool has_metadata = 20;
}

message UpdateSessionResponse {
  bool updated = 1;
  int32 status_lock = 2;
}

message DeleteSessionRequest {
  string session_id = 1;
  bool cascade = 2;
}

message DeleteSessionResponse {
  bool deleted = 1;
}

message EnqueueSpawnRequestRequest {
  string root_session_id = 1;
  string parent_agent_id = 2;
  string task = 3;
  string system_prompt = 4;
}

message EnqueueSpawnRequestResponse {
  bool enqueued = 1;
}

message SpawnQueueItem {
  int64 id = 1;
  string root_session_id = 2;
  string parent_agent_id = 3;
  string task = 4;
  string system_prompt = 5;
  string created_at = 6;
  string consumed_at = 7;
}

message ClaimSpawnRequestRequest {
  string root_session_id = 1;
  string parent_agent_id = 2;
}

message ClaimSpawnRequestResponse {
  SpawnQueueItem item = 1;
}

message RuntimeToolPolicy {
  bool enabled = 1;
  bool auto_approve = 2;
}

message RuntimeChatMessage {
  string role = 1;
  google.protobuf.Value content = 2;
}

message RuntimeLoggerConfig {
  bool enabled = 1;
  string level = 2;
  string destination = 3;
  string name = 4;
  google.protobuf.Struct bindings = 5;
}

message RuntimeSessionConfig {
  string session_id = 1;
  string workspace_root = 2;
  string cwd = 3;
  string provider = 4;
  string model = 5;
  string mode = 6;
  string api_key = 7;
  string system_prompt = 8;
  int32 max_iterations = 9;
  bool has_max_iterations = 10;
  bool enable_tools = 11;
  bool enable_spawn = 12;
  bool enable_teams = 13;
  bool disable_mcp_settings_tools = 22;
  bool auto_approve_tools = 14;
  bool has_auto_approve_tools = 15;
  string team_name = 16;
  int32 mission_step_interval = 17;
  int32 mission_time_interval_ms = 18;
  map<string, RuntimeToolPolicy> tool_policies = 19;
  repeated RuntimeChatMessage initial_messages = 20;
  RuntimeLoggerConfig logger = 21;
}

message RuntimeAttachmentFile {
  string name = 1;
  string content = 2;
}

message RuntimeAttachments {
  repeated string user_images = 1;
  repeated RuntimeAttachmentFile user_files = 2;
}

message RuntimeTurnRequest {
  RuntimeSessionConfig config = 1;
  repeated RuntimeChatMessage messages = 2;
  string prompt = 3;
  RuntimeAttachments attachments = 4;
  string delivery = 5;
}

message RuntimeUsage {
  int32 input_tokens = 1;
  int32 output_tokens = 2;
  int32 cache_read_tokens = 3;
  bool has_cache_read_tokens = 4;
  int32 cache_write_tokens = 5;
  bool has_cache_write_tokens = 6;
  double total_cost = 7;
  bool has_total_cost = 8;
}

message RuntimeToolCallResult {
  string name = 1;
  google.protobuf.Value input = 2;
  bool has_input = 3;
  google.protobuf.Value output = 4;
  bool has_output = 5;
  string error = 6;
  int32 duration_ms = 7;
  bool has_duration_ms = 8;
}

message RuntimeTurnResult {
  string text = 1;
  RuntimeUsage usage = 2;
  int32 input_tokens = 3;
  int32 output_tokens = 4;
  int32 iterations = 5;
  string finish_reason = 6;
  repeated RuntimeChatMessage messages = 7;
  repeated RuntimeToolCallResult tool_calls = 8;
}

message RuntimeStartResult {
  string session_id = 1;
  string manifest_path = 2;
  string transcript_path = 3;
  string hook_path = 4;
  string messages_path = 5;
}

message StartRuntimeSessionRequest {
  RuntimeSessionConfig request = 1;
}

message StartRuntimeSessionResponse {
  string session_id = 1;
  RuntimeStartResult start_result = 2;
}

message SendRuntimeSessionRequest {
  string session_id = 1;
  RuntimeTurnRequest request = 2;
}

message SendRuntimeSessionResponse {
  RuntimeTurnResult result = 1;
}

message StopRuntimeSessionRequest {
  string session_id = 1;
}

message StopRuntimeSessionResponse {
  bool applied = 1;
}

message AbortRuntimeSessionRequest {
  string session_id = 1;
}

message AbortRuntimeSessionResponse {
  bool applied = 1;
}

message ProviderActionListProvidersRequest {}

message ProviderActionGetProviderModelsRequest {
  string provider_id = 1;
}

message ProviderActionAddProviderRequest {
  string provider_id = 1;
  string name = 2;
  string base_url = 3;
  string api_key = 4;
  map<string, string> headers = 5;
  int32 timeout_ms = 6;
  bool has_timeout_ms = 7;
  repeated string models = 8;
  string default_model_id = 9;
  string models_source_url = 10;
  repeated string capabilities = 11;
}

message ProviderActionSaveProviderSettingsRequest {
  string provider_id = 1;
  bool enabled = 2;
  bool has_enabled = 3;
  string api_key = 4;
  bool has_api_key = 5;
  string base_url = 6;
  bool has_base_url = 7;
}

message ProviderActionClineAccountRequest {
  string operation = 1;
  string user_id = 2;
  string organization_id = 3;
  string member_id = 4;
  bool clear_organization_id = 5;
}

message ProviderActionRequest {
  oneof action {
    ProviderActionListProvidersRequest list_providers = 1;
    ProviderActionGetProviderModelsRequest get_provider_models = 2;
    ProviderActionAddProviderRequest add_provider = 3;
    ProviderActionSaveProviderSettingsRequest save_provider_settings = 4;
    ProviderActionClineAccountRequest cline_account = 5;
  }
}

message RunProviderActionRequest {
  ProviderActionRequest request = 1;
}

message RunProviderActionResponse {
  google.protobuf.Value result = 1;
}

message RunProviderOAuthLoginRequest {
  string provider = 1;
}

message RunProviderOAuthLoginResponse {
  string provider = 1;
  string api_key = 2;
}

message EnterpriseAuthenticateRequest {
  string provider_id = 1;
  string workspace_path = 2;
  string root_path = 3;
  string project_id = 4;
  string workspace_id = 5;
  string organization_id = 6;
}

message EnterpriseAuthenticateResponse {
  string provider_id = 1;
  bool authenticated = 2;
  repeated string roles = 3;
  google.protobuf.Struct claims = 4;
  google.protobuf.Struct metadata = 5;
}

message EnterpriseSyncRequest {
  string provider_id = 1;
  string workspace_path = 2;
  string root_path = 3;
  string project_id = 4;
  string workspace_id = 5;
  string organization_id = 6;
  bool use_cached_bundle = 7;
  bool has_use_cached_bundle = 8;
}

message EnterpriseSyncResponse {
  string provider_id = 1;
  bool authenticated = 2;
  bool has_cached_bundle = 3;
  string applied_config_version = 4;
  repeated string roles = 5;
  bool has_telemetry_overrides = 6;
  int32 rules_count = 7;
  int32 workflows_count = 8;
  int32 skills_count = 9;
  google.protobuf.Struct claims = 10;
  google.protobuf.Struct metadata = 11;
}

message EnterpriseStatusRequest {
  string provider_id = 1;
  string workspace_path = 2;
  string root_path = 3;
}

message EnterpriseStatusResponse {
  string provider_id = 1;
  bool authenticated = 2;
  bool has_cached_bundle = 3;
  string applied_config_version = 4;
  repeated string roles = 5;
  bool has_telemetry_overrides = 6;
  int32 rules_count = 7;
  int32 workflows_count = 8;
  int32 skills_count = 9;
  google.protobuf.Struct claims = 10;
  google.protobuf.Struct metadata = 11;
}

message StartTaskRequest {
  string session_id = 1;
  string task_id = 2;
  string title = 3;
  google.protobuf.Struct payload = 4;
}

message CompleteTaskRequest {
  string session_id = 1;
  string task_id = 2;
  string status = 3;
  google.protobuf.Struct result = 4;
}

message TaskResponse {
  string session_id = 1;
  string task_id = 2;
  string status = 3;
  bool updated = 4;
}

message PublishEventRequest {
  string event_id = 1;
  string session_id = 2;
  string task_id = 3;
  string event_type = 4;
  google.protobuf.Struct payload = 5;
  string source_client_id = 6;
}

message PublishEventResponse {
  string event_id = 1;
  bool accepted = 2;
}

message StreamEventsRequest {
  string client_id = 1;
  repeated string session_ids = 2;
}

message RoutedEvent {
  string event_id = 1;
  string session_id = 2;
  string task_id = 3;
  string event_type = 4;
  google.protobuf.Struct payload = 5;
  string source_client_id = 6;
  string ts = 7;
}

message RequestToolApprovalRequest {
  string approval_id = 1;
  string session_id = 2;
  string task_id = 3;
  string tool_call_id = 4;
  string tool_name = 5;
  string input_json = 6;
  string requester_client_id = 7;
  int32 timeout_ms = 8;
}

message RequestToolApprovalResponse {
  string approval_id = 1;
  bool decided = 2;
  bool approved = 3;
  string reason = 4;
}

message RespondToolApprovalRequest {
  string approval_id = 1;
  string responder_client_id = 2;
  bool approved = 3;
  string reason = 4;
}

message RespondToolApprovalResponse {
  string approval_id = 1;
  bool applied = 2;
}

message ListPendingApprovalsRequest {
  string session_id = 1;
}

message PendingApproval {
  string approval_id = 1;
  string session_id = 2;
  string task_id = 3;
  string tool_call_id = 4;
  string tool_name = 5;
  string input_json = 6;
  string requester_client_id = 7;
  string created_at = 8;
}

message ListPendingApprovalsResponse {
  repeated PendingApproval approvals = 1;
}

message Schedule {
  string schedule_id = 1;
  string name = 2;
  string cron_pattern = 3;
  string prompt = 4;
  string provider = 5;
  string model = 6;
  string mode = 7;
  string workspace_root = 8;
  string cwd = 9;
  string system_prompt = 10;
  int32 max_iterations = 11;
  bool has_max_iterations = 12;
  int32 timeout_seconds = 13;
  bool has_timeout_seconds = 14;
  int32 max_parallel = 15;
  bool enabled = 16;
  string created_at = 17;
  string updated_at = 18;
  string last_run_at = 19;
  string next_run_at = 20;
  string created_by = 21;
  string tags_json = 22;
  google.protobuf.Struct metadata = 23;
}

message ScheduleExecution {
  string execution_id = 1;
  string schedule_id = 2;
  string session_id = 3;
  string triggered_at = 4;
  string started_at = 5;
  string ended_at = 6;
  string status = 7;
  int32 exit_code = 8;
  bool has_exit_code = 9;
  string error_message = 10;
  int32 iterations = 11;
  bool has_iterations = 12;
  int32 tokens_used = 13;
  bool has_tokens_used = 14;
  double cost_usd = 15;
  bool has_cost_usd = 16;
}

message CreateScheduleRequest {
  string name = 1;
  string cron_pattern = 2;
  string prompt = 3;
  string provider = 4;
  string model = 5;
  string mode = 6;
  string workspace_root = 7;
  string cwd = 8;
  string system_prompt = 9;
  int32 max_iterations = 10;
  bool has_max_iterations = 11;
  int32 timeout_seconds = 12;
  bool has_timeout_seconds = 13;
  int32 max_parallel = 14;
  bool enabled = 15;
  string created_by = 16;
  string tags_json = 17;
  google.protobuf.Struct metadata = 18;
}

message CreateScheduleResponse {
  Schedule schedule = 1;
}

message GetScheduleRequest {
  string schedule_id = 1;
}

message GetScheduleResponse {
  Schedule schedule = 1;
}

message ListSchedulesRequest {
  int32 limit = 1;
  bool has_enabled = 2;
  bool enabled = 3;
  string tags_json = 4;
}

message ListSchedulesResponse {
  repeated Schedule schedules = 1;
}

