title = "Cline SDK secret scanning"

[extend]
useDefault = true

[[rules]]
id = "generic-api-key"

[[rules.allowlists]]
description = "Synthetic SAP AI Core model IDs in session factory tests"
condition = "AND"
regexTarget = "match"
paths = ['''apps/vscode/src/sdk/cline-session-factory\.test\.ts''']
regexes = ['''anthropic--claude-(?:3\.5|4\.6)-sonnet''']
