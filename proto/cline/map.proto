syntax = "proto3";

package cline;

option go_package = "github.com/cline/grpc-go/cline";
option java_package = "bot.cline.proto";
option java_multiple_files = true;

import "cline/common.proto";

// Message representing a map layer
message MapLayer {
    string id = 1;                    // Unique layer identifier
    string name = 2;                  // Display name
    string geojson = 3;               // GeoJSON as string
    string layer_type = 4;            // "polygon", "point", "line", "raster"
    MapLayerStyle style = 5;          // Visual styling
    map<string, string> metadata = 6; // Additional metadata
    bool visible = 7;                 // Visibility state (default true)
}

// Visual styling for a layer
message MapLayerStyle {
    string color = 1;          // Hex color (e.g., "#0000FF")
    double opacity = 2;        // 0.0 to 1.0
    int32 stroke_width = 3;    // Line width in pixels
    string stroke_color = 4;   // Stroke color
    string fill_color = 5;     // Fill color
    double fill_opacity = 6;   // Fill opacity 0.0 to 1.0
    int32 weight = 7;          // Line weight in pixels
}

// Request to add a layer to the map
message AddMapLayerRequest {
    MapLayer layer = 1;
    bool auto_zoom = 2;        // Auto-fit to layer bounds
    bool replace_existing = 3; // Replace layer with same ID
}

// Request to remove a layer
message RemoveMapLayerRequest {
    string layer_id = 1;
}

// Request to clear all layers
message ClearMapLayersRequest {}

// Request to show the map view
message ShowMapRequest {}

// Response with current map state
message MapStateResponse {
    repeated MapLayer layers = 1;
    int32 layer_count = 2;
}

// Active region of interest (basin / study area)
message MapRoi {
    string id = 1;
    string name = 2;
    string source = 3;           // agent | map_draw | workspace | session_watershed
    string geojson = 4;          // Feature or FeatureCollection JSON
    double area_ha = 5;
    string workspace_path = 6;     // e.g. roi/penobscot_basin.geojson
}

// Map camera state for session sync
message MapSessionView {
    double longitude = 1;
    double latitude = 2;
    double zoom = 3;
    double bearing = 4;
    double pitch = 5;
}

// Full map session snapshot (host-owned)
message MapSessionState {
    repeated MapLayer layers = 1;
    MapRoi active_roi = 2;
    MapSessionView view = 3;
    repeated string visible_layer_ids = 4;
    string workspace_root = 5;
    int64 updated_at_ms = 6;
    string basemap_id = 7;     // e.g. esri-imagery, usgs-topo
    string basemap_name = 8;   // human label shown in map UI
}

// Outbound telemetry from map webview
message MapEvent {
    string type = 1;
    string payload_json = 2;
    int64 timestamp_ms = 3;
    string source = 4; // user | agent | system
}

message SetActiveRoiRequest {
    MapRoi roi = 1; // omit or empty geojson to clear
}

message SaveRoiToWorkspaceRequest {
    string name = 1;       // slug for roi/<name>.geojson
    MapRoi roi = 2;        // uses active roi when omitted
    string format = 3;     // geojson | shapefile
}

message SaveRoiToWorkspaceResponse {
    string workspace_path = 1;
    string active_pointer_path = 2;
}

message LoadRoiFromWorkspaceRequest {
    string workspace_path = 1; // empty = load roi/active.json pointer
}

message LoadRoiFromWorkspaceResponse {
    MapRoi roi = 1;
}

message ReportMapEventRequest {
    MapEvent event = 1;
}

message GetRecentMapEventsRequest {
    int32 limit = 1;
}

message MapEventsResponse {
    repeated MapEvent events = 1;
}

message PrepareMapExportRequest {
    string export_id = 1;
    string suggested_filename = 2;
    repeated string formats = 3; // png | pdf
}

message PrepareMapExportResponse {
    bool accepted = 1;
    string base_path = 2; // absolute path without extension
    string message = 3;
}

message MapExportArtifact {
    string format = 1;      // png | pdf
    string filename = 2;
    string mime_type = 3;
    // ProtoBus currently serializes webview messages as JSON, so browser-side
    // binary bytes must cross the bridge as base64 instead of Node Buffer bytes.
    string data_base64 = 4;
}

message MapExportOutput {
    string format = 1;      // png | pdf | provenance
    string uri = 2;
    string filename = 3;
    string sha256 = 4;
    int64 size_bytes = 5;
}

message SaveMapExportRequest {
    string export_id = 1;
    string base_path = 2;       // from PrepareMapExportResponse
    repeated MapExportArtifact artifacts = 3;
    string manifest_json = 4;
}

message SaveMapExportResponse {
    bool ok = 1;
    repeated MapExportOutput outputs = 2;
    string message = 3;
}

// Service for map operations
service MapService {
    // Add a layer to the map
    rpc addMapLayer(AddMapLayerRequest) returns (Empty);
    
    // Remove a layer from the map
    rpc removeMapLayer(RemoveMapLayerRequest) returns (Empty);
    
    // Clear all layers
    rpc clearMapLayers(ClearMapLayersRequest) returns (Empty);
    
    // Show the map view (switch to map tab)
    rpc showMap(ShowMapRequest) returns (Empty);
    
    // Get current map state
    rpc getMapState(EmptyRequest) returns (MapStateResponse);
    
    // Subscribe to map layer updates
    rpc subscribeToMapLayers(EmptyRequest) returns (stream MapLayer);

    // Map session (ROI, view, orchestration)
    rpc getMapSession(EmptyRequest) returns (MapSessionState);
    rpc setActiveRoi(SetActiveRoiRequest) returns (Empty);
    rpc saveRoiToWorkspace(SaveRoiToWorkspaceRequest) returns (SaveRoiToWorkspaceResponse);
    rpc loadRoiFromWorkspace(LoadRoiFromWorkspaceRequest) returns (LoadRoiFromWorkspaceResponse);
    rpc reportMapEvent(ReportMapEventRequest) returns (Empty);
    rpc getRecentMapEvents(GetRecentMapEventsRequest) returns (MapEventsResponse);
    rpc subscribeToMapSession(EmptyRequest) returns (stream MapSessionState);
    rpc subscribeToMapEvents(EmptyRequest) returns (stream MapEvent);
    rpc prepareMapExport(PrepareMapExportRequest) returns (PrepareMapExportResponse);
    rpc saveMapExport(SaveMapExportRequest) returns (SaveMapExportResponse);
}
