name: HTML Preview Fixture

on:
  pull_request:
    branches: [main]
    paths:
      - "src/test/fixtures/html-preview/**"
      - "src/services/artifact-preview/__tests__/goldenFixture.test.ts"
      - "src/services/artifact-preview/validateModule.ts"
      - ".github/workflows/html-preview-fixture.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-fixture:
    name: Validate golden fixture
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run fixture unit test
        env:
          TS_NODE_PROJECT: ./tsconfig.unit-test.json
        run: >-
          npx mocha
          --no-config
          --require ts-node/register
          --require source-map-support/register
          --require ./src/test/requires.ts
          src/services/artifact-preview/__tests__/goldenFixture.test.ts
