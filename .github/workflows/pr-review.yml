name: PR Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip draft PRs
    if: github.event.pull_request.draft == false
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Cline CLI
        run: npm install -g cline

      - name: Configure Cline with Anthropic
        run: |
          cline auth --provider anthropic \
            --apikey "${{ secrets.ANTHROPIC_API_KEY }}" \
            --modelid claude-haiku-4-5-20251001

      - name: Get PR context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get PR diff
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr_diff.txt

          # Get PR info
          gh pr view ${{ github.event.pull_request.number }} --json title,body,files > /tmp/pr_info.json

          # Get head commit SHA for inline comments
          gh pr view ${{ github.event.pull_request.number }} --json headRefOid -q .headRefOid > /tmp/head_sha.txt

      - name: Review PR with Cline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          HEAD_SHA=$(cat /tmp/head_sha.txt)

          cline --yolo "You are a code reviewer for the Cline repository. Review PR #${PR_NUMBER} by @${PR_AUTHOR}.

          ## PR Title
          ${PR_TITLE}

          ## PR Details (JSON)
          $(cat /tmp/pr_info.json)

          ## Diff
          \`\`\`diff
          $(cat /tmp/pr_diff.txt)
          \`\`\`

          ## Your Task

          1. **Analyze the changes**: Understand what the PR is doing and why.

          2. **Look for issues**: Check for bugs, security vulnerabilities, performance concerns, code quality issues, missing error handling, and potential edge cases.

          3. **Post inline comments** on specific lines where you have concerns:
             \`\`\`bash
             gh api repos/{owner}/{repo}/pulls/${PR_NUMBER}/comments \\
               -f body=\"Your comment here\" \\
               -f path=\"path/to/file.ts\" \\
               -f commit_id=\"${HEAD_SHA}\" \\
               -f side=\"RIGHT\" \\
               -F line=123
             \`\`\`

          4. **Post a summary comment** on the PR after reviewing:
             \`\`\`bash
             gh pr comment ${PR_NUMBER} --body \"Your summary here\"
             \`\`\`

          ## Guidelines
          - Be constructive and helpful, not nitpicky
          - Focus on substantive issues, not style (we have linters)
          - Thank the author for their contribution
          - Keep comments concise and actionable
          - Only comment where there are genuine concerns
          - If the PR looks good, just post a brief positive summary

          ## Important
          - You MUST post at least a summary comment on the PR using gh pr comment
          - Use gh CLI commands for GitHub interactions (GH_TOKEN is configured)
          - Do NOT approve or request changes - just leave comments"
