name: ext-vscode-test-e2e

on:
    push:
        branches:
            - main
    pull_request:
        types: [opened, reopened, synchronize, ready_for_review]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: read

jobs:
    detect-changes:
        runs-on: ubuntu-latest
        name: Detect Changes
        outputs:
            e2e: ${{ steps.force.outputs.run_all == 'true' || steps.filter.outputs.e2e == 'true' }}
        steps:
            - id: force
              if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
              run: echo "run_all=true" >> "$GITHUB_OUTPUT"

            - uses: actions/checkout@v4
              if: steps.force.outputs.run_all != 'true'

            - uses: dorny/paths-filter@v3
              if: steps.force.outputs.run_all != 'true'
              id: filter
              with:
                  filters: |
                      e2e:
                          - 'src/**'
                          - 'webview-ui/**'
                          - 'proto/**'
                          - 'tests/**'
                          - 'scripts/**'
                          - 'standalone/**'
                          - 'assets/**'
                          - 'walkthrough/**'
                          - 'package.json'
                          - 'bun.lock'
                          - 'buf.yaml'
                          - 'tsconfig*.json'
                          - 'biome.jsonc'
                          - 'esbuild.mjs'
                          - '.mocharc.json'
                          - '.vscode-test.mjs'
                          - '.vscodeignore'
                          - 'playwright*.ts'
                          - '.github/workflows/ext-vscode-test-e2e.yml'

    matrix_prep:
        needs: detect-changes
        if: needs.detect-changes.outputs.e2e == 'true'
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.set-matrix.outputs.matrix }}
        steps:
            - id: set-matrix
              run: |
                  echo 'matrix=[{"runner":"ubuntu"},{"runner":"windows"},{"runner":"macos"}]' >> $GITHUB_OUTPUT

    e2e:
        needs: [detect-changes, matrix_prep]
        if: needs.detect-changes.outputs.e2e == 'true'
        strategy:
            fail-fast: false
            matrix:
                include: ${{ fromJson(needs.matrix_prep.outputs.matrix) }}
        runs-on: ${{ matrix.runner }}-latest
        timeout-minutes: 20
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v4
            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.13"

            # Cache root dependencies - only reuse if bun.lock exactly matches
            - name: Cache root dependencies
              uses: actions/cache@v4
              id: root-cache
              with:
                  path: node_modules
                  key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

            # Cache webview-ui dependencies - only reuse if bun.lock exactly matches
            - name: Cache webview-ui dependencies
              uses: actions/cache@v4
              id: webview-cache
              with:
                  path: webview-ui/node_modules
                  key: ${{ runner.os }}-bun-webview-${{ hashFiles('webview-ui/bun.lock', 'webview-ui/package-lock.json') }}

            # Cache VS Code installation
            - name: Cache VS Code
              uses: actions/cache@v4
              id: vscode-cache
              with:
                  path: .vscode-test
                  key: vscode-${{ runner.os }}-stable-${{ hashFiles('.vscode-test.mjs', 'package.json') }}
                  restore-keys: |
                      vscode-${{ runner.os }}-stable-

            # Cache Playwright browsers
            - name: Cache Playwright browsers
              uses: actions/cache@v4
              id: playwright-cache
              with:
                  path: |
                      ~/.cache/ms-playwright
                      ~/Library/Caches/ms-playwright
                      ~/AppData/Local/ms-playwright
                  key: playwright-browsers-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      playwright-browsers-${{ runner.os }}-

            - name: Install root dependencies
              run: bun install --frozen-lockfile
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install webview-ui dependencies
              run: cd webview-ui && bun install --frozen-lockfile

            - name: Install vsce
              run: bun add -g @vscode/vsce

            - name: Install xvfb on Linux
              if: matrix.runner == 'ubuntu'
              run: sudo apt-get update && sudo apt-get install -y xvfb

            # Run optimized E2E tests (eliminates redundant builds)
            - name: Run E2E tests - Linux
              if: matrix.runner == 'ubuntu'
              run: xvfb-run -a bun run test:e2e:optimal

            - name: Run E2E tests - Non-Linux
              if: matrix.runner != 'ubuntu'
              run: bun run test:e2e:optimal

            - uses: actions/upload-artifact@v4
              if: ${{ failure() }}
              with:
                  name: playwright-recordings-${{ matrix.runner }}
                  path: |
                      test-results/playwright/
