name: Smoke Tests

# Temporarily disabled: this workflow built and linked the legacy CLI
# (`cd cli && npm install && npm run build && npm link`) before running the
# smoke-test scenarios. The legacy CLI publish chain has been retired in
# favor of the SDK CLI at `sdk/apps/cli/`. The scenarios under
# `evals/smoke-tests/scenarios/` are CLI-agnostic and should be re-enabled
# once the build step is repointed at the new SDK CLI. Until then, manual
# `workflow_dispatch` runs record the disabled state instead of running tests.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests-disabled:
    name: Smoke Tests Disabled
    runs-on: ubuntu-latest
    steps:
      - name: Report disabled smoke tests
        run: |
          message="Smoke eval CI is disabled until it is repointed at the SDK CLI. Follow-up: https://linear.app/cline-bot/issue/CLINE-2188/re-enable-smoke-eval-ci-against-the-sdk-cli"
          echo "$message"
          echo "$message" >> "$GITHUB_STEP_SUMMARY"
