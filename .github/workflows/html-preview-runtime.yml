name: HTML Preview Runtime

on:
  pull_request:
    branches: [main]
    paths:
      - "src/test/e2e/html-preview-runtime.test.ts"
      - "src/test/e2e/html-preview-state-course.test.ts"
      - "src/test/e2e/html-preview-trust-identity-events.test.ts"
      - "src/test/e2e/utils/helpers.ts"
      - "src/test/fixtures/html-preview/**"
      - "src/extension.ts"
      - "src/services/artifact-preview/**"
      - "src/services/htmlPreview/**"
      - "src/core/controller/htmlPreview/**"
      - "src/hosts/vscode/VscodeHtmlPreviewProvider.ts"
      - "webview-ui/src/components/html_preview/**"
      - "scripts/sanitize-e2e-artifacts.mjs"
      - ".github/workflows/html-preview-runtime.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  runtime:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu
            grep: "@phase0-(full|state-course-full|trust-identity-full)"
          - runner: windows
            grep: "@phase0-(smoke|state-course-smoke|trust-smoke)"
          - runner: macos
            grep: "@phase0-(smoke|state-course-smoke|trust-smoke)"
    runs-on: ${{ matrix.runner }}-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure deterministic Python runtime
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check matplotlib
          python -c 'import sys; print("AIHYDRO_E2E_PYTHON=" + sys.executable)' >> "$GITHUB_ENV"

      - name: Install dependencies
        shell: bash
        run: |
          npm ci
          cd webview-ui
          npm ci

      - name: Install xvfb
        if: matrix.runner == 'ubuntu'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build extension and E2E assets
        shell: bash
        run: |
          npm run test:e2e:build
          node src/test/e2e/utils/build.mjs

      - name: Run deterministic trust, identity, event, and navigation contracts
        shell: bash
        run: |
          npm run test:unit -- --grep 'HTML Preview Python execution policy|PreviewSessionService observable module identity|PreviewCommandWatcher agent module identity|HTML Preview agent navigation intent|runArtifactCode'
          cd webview-ui
          npx vitest run src/components/html_preview/__tests__/courseAgentNavigation.test.ts

      - name: Run complete Ubuntu matrix
        if: matrix.runner == 'ubuntu'
        shell: bash
        run: xvfb-run -a npx playwright test -c playwright.config.ts src/test/e2e/html-preview-*.test.ts --grep '${{ matrix.grep }}'

      - name: Run platform-sensitive smoke test
        if: matrix.runner != 'ubuntu'
        shell: bash
        run: npx playwright test -c playwright.config.ts src/test/e2e/html-preview-*.test.ts --grep '${{ matrix.grep }}'

      - name: Sanitize allowlisted failure evidence
        if: failure()
        run: node scripts/sanitize-e2e-artifacts.mjs test-results/playwright test-results/sanitized

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: html-preview-runtime-${{ matrix.runner }}
          path: test-results/sanitized/
          if-no-files-found: ignore
