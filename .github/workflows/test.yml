name: Tests

on:
    push:
        branches:
            - main
    workflow_dispatch:
    pull_request:
        branches:
            - main
    workflow_call:

# Set default permissions for all jobs
permissions:
    contents: read # Needed to check out code
    checks: write # Needed to report test results
    pull-requests: write # Needed to add comments/annotations to PRs

jobs:
    preflight:
        runs-on: ubuntu-latest
        name: Preflight
        outputs:
            run_quality_checks: ${{ steps.scope.outputs.run_quality_checks }}
            run_core_tests: ${{ steps.scope.outputs.run_core_tests }}
            run_webview_tests: ${{ steps.scope.outputs.run_webview_tests }}
            run_cli_tests: ${{ steps.scope.outputs.run_cli_tests }}
            run_platform_tests: ${{ steps.scope.outputs.run_platform_tests }}
            run_windows_tests: ${{ steps.scope.outputs.run_windows_tests }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect changed scope
              id: scope
              run: |
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    node scripts/ci-changed-scope.mjs "origin/${{ github.base_ref }}"
                  else
                    # Push to main, workflow_dispatch, workflow_call: run everything
                    echo "Non-PR event (${{ github.event_name }}) — running all scopes"
                    echo "run_quality_checks=true" >> "$GITHUB_OUTPUT"
                    echo "run_core_tests=true" >> "$GITHUB_OUTPUT"
                    echo "run_webview_tests=true" >> "$GITHUB_OUTPUT"
                    echo "run_cli_tests=true" >> "$GITHUB_OUTPUT"
                    echo "run_platform_tests=true" >> "$GITHUB_OUTPUT"
                    echo "run_windows_tests=true" >> "$GITHUB_OUTPUT"
                  fi

    quality-checks:
        needs: preflight
        if: needs.preflight.outputs.run_quality_checks == 'true'
        runs-on: ubuntu-latest
        name: Quality Checks
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'
                  cache-dependency-path: |
                      package-lock.json
                      webview-ui/package-lock.json

            - name: Install root dependencies
              run: npm ci
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install webview-ui dependencies
              run: cd webview-ui && npm ci

            - name: Run Quality Checks (Parallel)
              run: npm run ci:check-all

    test:
        needs: [preflight, quality-checks]
        if: |
            always() &&
            (needs.quality-checks.result == 'success' || needs.quality-checks.result == 'skipped') &&
            needs.preflight.outputs.run_core_tests == 'true'
        env:
            VSCODE_TEST_VERSION: 1.103.0
        strategy:
            fail-fast: false
            matrix:
                os: ${{ needs.preflight.outputs.run_windows_tests == 'true' && fromJson('["ubuntu-latest","windows-latest"]') || fromJson('["ubuntu-latest"]') }}
        runs-on: ${{ matrix.os }}
        name: ${{ matrix.os == 'ubuntu-latest' && 'test' || format('test ({0})', matrix.os) }}
        defaults:
            run:
                shell: bash
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Cache root dependencies
              uses: actions/cache@v4
              id: root-cache
              with:
                  path: node_modules
                  key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

            - name: Cache webview-ui dependencies
              uses: actions/cache@v4
              id: webview-cache
              with:
                  path: webview-ui/node_modules
                  key: ${{ runner.os }}-npm-webview-${{ hashFiles('webview-ui/package-lock.json') }}

            - name: Install root dependencies
              if: steps.root-cache.outputs.cache-hit != 'true'
              run: npm ci
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install webview-ui dependencies
              if: steps.webview-cache.outputs.cache-hit != 'true'
              run: cd webview-ui && npm ci

            - name: Set up NPM on Windows
              if: runner.os == 'Windows'
              run: |
                  npm config set script-shell "C:\\Program Files\\Git\\bin\\bash.exe"

            - name: Cache VS Code test runtime
              if: runner.os == 'Windows'
              uses: actions/cache@v4
              with:
                  path: .vscode-test
                  key: vscode-test-runtime-${{ runner.os }}-${{ env.VSCODE_TEST_VERSION }}

            # Build the extension and tests (without redundant checks)
            - name: Build Tests and Extension
              id: build_step
              run: npm run ci:build

            - name: Unit Tests with coverage - Linux
              id: unit_tests_linux
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' && runner.os == 'Linux' }}
              run: |
                  npx nyc --nycrc-path .nycrc.unit.json --reporter=lcov npm run test:unit

            - name: Unit Tests - Non-Linux
              id: unit_tests_non_linux
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' && runner.os != 'Linux' }}
              run: |
                  npm run test:unit

            - name: Extension Integration Tests - Linux
              id: integration_tests_linux
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' && runner.os == 'Linux' }}
              run: xvfb-run -a npm run test:coverage

            - name: Extension Integration Tests - Non-Linux
              id: integration_tests_non_linux
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' && runner.os != 'Linux' }}
              run: |
                  for attempt in 1 2 3; do
                    echo "Running extension integration tests (attempt ${attempt}/3)"
                    if npm run test:integration; then
                      exit 0
                    fi

                    if [ "$attempt" -eq 3 ]; then
                      echo "Extension integration tests failed after 3 attempts"
                      exit 1
                    fi

                    echo "Extension integration tests failed; retrying after short delay"
                    sleep 5
                  done

            - name: Webview Tests with Coverage
              id: webview_tests
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' && needs.preflight.outputs.run_webview_tests == 'true' }}
              run: |
                  cd webview-ui
                  npm run test:coverage

            - name: CLI Tests
              id: cli_tests
              if: ${{ !cancelled() && steps.build_step.outcome == 'success' && needs.preflight.outputs.run_cli_tests == 'true' }}
              run: cd cli && npm run test:run

            - name: Save Coverage Reports
              uses: actions/upload-artifact@v4
              # Only upload artifacts on Linux - We only need coverage from one OS
              if: runner.os == 'Linux'
              with:
                  name: pr-coverage-reports
                  path: |
                      coverage-unit/lcov.info
                      webview-ui/coverage/lcov.info

    test-platform-integration:
        needs: [preflight, quality-checks]
        if: |
            always() &&
            (needs.quality-checks.result == 'success' || needs.quality-checks.result == 'skipped') &&
            needs.preflight.outputs.run_platform_tests == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'
                  cache-dependency-path: |
                      package-lock.json
                      webview-ui/package-lock.json
                      testing-platform/package-lock.json

            - name: Install root dependencies
              run: npm ci
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install webview-ui dependencies
              run: cd webview-ui && npm ci

            - name: Download ripgrep binaries
              run: npm run download-ripgrep

            - name: Compile Standalone
              run: npm run compile-standalone

            - name: Install testing platform dependencies
              run: cd testing-platform && npm ci

            - name: Running testing platform integration spec tests
              timeout-minutes: 7
              run: npm run test:tp-orchestrator -- tests/specs/ --count=1 --coverage

            - name: Save Coverage Reports
              uses: actions/upload-artifact@v4
              with:
                name: test-platform-integration-core-coverage
                path: coverage/**/lcov.info

    qlty:
        needs: [test, test-platform-integration]
        if: always() && (needs.test.result == 'success' || needs.test-platform-integration.result == 'success')
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download unit tests coverage reports
              uses: actions/download-artifact@v4
              continue-on-error: true
              id: download-unit-coverage
              with:
                  name: pr-coverage-reports
                  path: .

            - name: Upload core unit tests coverage to Qlty
              if: steps.download-unit-coverage.outcome == 'success'
              uses: qltysh/qlty-action/coverage@v2
              with:
                  token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
                  files: |
                    coverage-unit/lcov.info
                  tag: unit:core

            - name: Upload webview-ui unit tests coverage to Qlty
              if: steps.download-unit-coverage.outcome == 'success'
              uses: qltysh/qlty-action/coverage@v2
              with:
                  token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
                  files: |
                    webview-ui/coverage/lcov.info
                  tag: unit:webview-ui
                  add-prefix: webview-ui/

            - name: Download test platform integration core coverage artifact
              uses: actions/download-artifact@v4
              continue-on-error: true
              id: download-integration-coverage
              with:
                name: test-platform-integration-core-coverage
                path: integration-core-coverage-reports

            - name: Upload core integration tests coverage to Qlty
              if: steps.download-integration-coverage.outcome == 'success'
              uses: qltysh/qlty-action/coverage@v2
              with:
                token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
                files: integration-core-coverage-reports/**/lcov.info
                tag: integration:core
