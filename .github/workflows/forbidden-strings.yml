name: Forbidden Strings

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check for forbidden strings
        shell: bash
        run: |
          FORBIDDEN=(
            "extract_camels_attributes"
            "hydrocatch"
            "delineate_autobuffer_bbox"
            "AI_HYDRO_PLATFORM_ROADMAP"
            "\.clinerules"
          )

          EXCLUDE_ARGS=(
            "--glob=!node_modules/**"
            "--glob=!out/**"
            "--glob=!CHANGELOG.md"
            "--glob=!docs/changelog.md"
            "--glob=!local-docs/**"
            # Intentional pedagogical content — these JSON files document deprecated
            # names (hydrocatch) so agents learn what NOT to do; must mention them.
            "--glob=!knowledge/instructions/general_guidelines.json"
            "--glob=!knowledge/instructions/common_pitfalls.json"
            # Defensive ignore — keep .clinerules/ in .vscodeignore so any legacy
            # rules folder a contributor still has locally never ships in the VSIX.
            "--glob=!.vscodeignore"
            # The guard itself necessarily contains the banned strings as patterns.
            "--glob=!.github/workflows/forbidden-strings.yml"
          )

          FAILED=0
          for term in "${FORBIDDEN[@]}"; do
            matches=$(rg -l "$term" "${EXCLUDE_ARGS[@]}" . 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "❌ FORBIDDEN STRING '$term' found in:"
              echo "$matches"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

          echo "✅ No forbidden strings found."
