name: sdk-test

on:
    push:
        branches:
            - main
        paths:
            - "sdk/**"
            - ".github/workflows/sdk-test.yml"
    workflow_dispatch:
    pull_request:
        branches:
            - main
        paths:
            - "sdk/**"
            - ".github/workflows/sdk-test.yml"
    workflow_call:

permissions:
    contents: read

defaults:
    run:
        working-directory: .
        # Force bash on every OS (Git Bash on Windows). Works around bun#23960:
        # bun install fails to symlink `../`-traversal workspaces on Windows under
        # PowerShell/cmd, but succeeds when invoked from Git Bash.
        shell: bash

jobs:
    quality-checks:
        runs-on: ubuntu-latest
        name: Quality Checks
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.13"

            - name: Install dependencies
              run: bun install
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Typecheck
              run: |
                  bun run build:sdk
                  bun run -F @cline/cli build
                  bun run types

            - name: Lint & Format
              run: bun run lint

    test:
        needs: quality-checks
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      node-version: "24.x"
                    - os: windows-latest
                      node-version: "24.x"
        runs-on: ${{ matrix.os }}
        name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # Enable Windows Developer Mode so non-admin processes (like bun) can
            # create symlinks. The hosted windows-latest runner does NOT enable
            # this by default (see actions/runner-images#14084), which causes
            # `bun install` to fail with ENOENT when materializing the
            # `../apps/*` workspace symlinks (bun#23960).
            - name: Enable Developer Mode (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              working-directory: .
              run: |
                  reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /f /v "AllowDevelopmentWithoutDevLicense" /d "1"

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.13"

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install dependencies
              run: bun install
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Build SDK
              id: build_sdk_step
              run: bun run build:sdk

            - name: Build CLI
              id: build_cli_step
              if: ${{ !cancelled() && steps.build_sdk_step.outcome == 'success' }}
              run: bun -F @cline/cli build

            - name: Run Tests
              if: ${{ !cancelled() && steps.build_sdk_step.outcome == 'success' && steps.build_cli_step.outcome == 'success' && matrix.os != 'windows-latest' }}
              run: bun run test

            - name: Run SDK Tests (Windows)
              if: ${{ !cancelled() && steps.build_sdk_step.outcome == 'success' && steps.build_cli_step.outcome == 'success' && matrix.os == 'windows-latest' }}
              run: bun -F './sdk/packages/**' test

            - name: Smoke test SQLite under Node
              if: ${{ !cancelled() && steps.build_sdk_step.outcome == 'success' && matrix.os != 'windows-latest' }}
              timeout-minutes: 10
              run: bun sdk/scripts/ci-node-smoke.ts

            - name: Run TUI e2e tests
              if: ${{ !cancelled() && steps.build_sdk_step.outcome == 'success' && steps.build_cli_step.outcome == 'success' && matrix.os == 'ubuntu-latest' && matrix.node-version == '24.x' }}
              run: bun -F @cline/cli test:e2e:cli:tui

            - name: Verify packages are publishable
              if: ${{ !cancelled() && steps.build_sdk_step.outcome == 'success' && steps.build_cli_step.outcome == 'success' && matrix.os == 'ubuntu-latest' && matrix.node-version == '24.x' }}
              run: bun sdk/scripts/check-publish.ts
